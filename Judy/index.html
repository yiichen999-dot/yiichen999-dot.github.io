<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Judy Wang - 數位名片</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(180deg, #f6f3e9 0%, #efe9cf 100%);
      color: #2f3747;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }

    .phone-frame {
      width: 100%;
      max-width: 430px;
    }

    .card {
      position: relative;
      overflow: hidden;
      background: #fcfcfb;
      border-radius: 36px;
      box-shadow: 0 16px 40px rgba(95, 81, 34, 0.10);
      border: 1px solid rgba(216, 196, 128, 0.18);
    }

    .hero {
      height: 240px;
      background: #edd789;
      position: relative;
    }

    .hero::after {
      content: "";
      position: absolute;
      left: -10%;
      right: -10%;
      bottom: -56px;
      height: 130px;
      background: #fcfcfb;
      border-radius: 50% 50% 0 0 / 100% 100% 0 0;
      transform: rotate(-2deg);
    }

    .content {
      position: relative;
      z-index: 2;
      padding: 0 28px 34px;
      margin-top: -118px;
    }

    .avatar-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }

    .avatar {
      width: 168px;
      height: 168px;
      object-fit: cover;
      border-radius: 50%;
      border: 7px solid #ffffff;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.12);
      background: #eee;
    }

    .identity {
      text-align: center;
      margin-bottom: 28px;
    }

    .name {
      font-size: 2.15rem;
      line-height: 1.08;
      margin: 0;
      color: #5a3f0d;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .title {
      margin-top: 12px;
      font-size: 1rem;
      color: #8b6012;
      font-weight: 600;
    }

    .company {
      margin-top: 6px;
      font-size: 0.95rem;
      color: #a08145;
      font-weight: 700;
      letter-spacing: 0.12em;
    }

    .info-list {
      display: grid;
      gap: 18px;
      margin-bottom: 28px;
    }

    .info-item {
      display: grid;
      grid-template-columns: 60px 1fr;
      align-items: center;
      column-gap: 16px;
    }

    .icon-badge {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: #f6f0d9;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #f0b53a;
      font-size: 1.2rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }

    .info-label {
      font-size: 0.95rem;
      color: #99a0ae;
      margin-bottom: 4px;
      font-weight: 500;
    }

    .info-value {
      font-size: 1rem;
      color: #374151;
      font-weight: 600;
      word-break: break-word;
      line-height: 1.35;
    }

    .divider {
      height: 1px;
      background: #f0e3b5;
      margin: 8px 0 22px;
    }

    .link-list {
      display: grid;
      gap: 16px;
    }

    .link-card {
      display: grid;
      grid-template-columns: 74px 1fr 22px;
      align-items: center;
      gap: 16px;
      text-decoration: none;
      background: #ffffff;
      border: 1px solid #f0ead6;
      border-radius: 24px;
      padding: 16px 18px;
      box-shadow: 0 6px 14px rgba(150, 138, 94, 0.08);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      color: inherit;
    }

    .link-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(150, 138, 94, 0.12);
    }

    .platform-icon {
      width: 64px;
      height: 64px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      flex-shrink: 0;
    }

    .platform-icon.whatsapp { background: #e8f7ef; color: #25D366; }
    .platform-icon.wechat { background: #eaf8e7; color: #2aae67; }
    .platform-icon.line { background: #eaf9ec; color: #06C755; }

    .platform-title {
      font-size: 1rem;
      color: #1f2937;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .platform-subtitle {
      font-size: 0.92rem;
      color: #6b7280;
      line-height: 1.35;
      word-break: break-word;
    }

    .arrow {
      color: #b0b7c2;
      font-size: 1.25rem;
    }

    .note {
      text-align: center;
      margin-top: 20px;
      color: #a6acb7;
      font-size: 0.82rem;
    }

    @media (max-width: 430px) {
      .content {
        padding: 0 20px 28px;
      }

      .name {
        font-size: 1.85rem;
      }

      .avatar {
        width: 150px;
        height: 150px;
      }

      .link-card {
        grid-template-columns: 64px 1fr 18px;
        padding: 14px;
      }

      .platform-icon {
        width: 56px;
        height: 56px;
        font-size: 1.7rem;
      }
    }
  </style>
</head>
<body>
  <div class="phone-frame">
    <div class="card">
      <div class="hero"></div>

      <div class="content">
        <div class="avatar-wrap">
          <img src="profile ph.jpg" alt="Judy Wang" class="avatar">
        </div>

        <section class="identity">
          <h1 class="name">Judy Wang</h1>
          <div class="title">Sales Representative</div>
          <div class="company">HUO SHIN ENTERPRISE (已更新)</div>
        </section>

        <section class="info-list">
          <div class="info-item">
            <div class="icon-badge"><i class="fa-solid fa-envelope"></i></div>
            <div>
              <div class="info-label">Email</div>
              <div class="info-value"><a href="mailto:huoshin@ms16.hinet.net" style="color: inherit; text-decoration: none;">huoshin@ms16.hinet.net</a></div>
            </div>
          </div>

          <div class="info-item">
            <div class="icon-badge"><i class="fa-solid fa-phone"></i></div>
            <div>
              <div class="info-label">Telephone</div>
              <div class="info-value"><a href="tel:+88647713096" style="color: inherit; text-decoration: none;">+886-4-771-3096 ext:17</a></div>
            </div>
          </div>

          <div class="info-item">
            <div class="icon-badge"><i class="fa-solid fa-location-dot"></i></div>
            <div>
              <div class="info-label">Location</div>
              <div class="info-value"><a href="https://www.google.com/maps/search/?api=1&query=Changhua%2C+Taiwan" target="_blank" rel="noopener noreferrer" style="color: inherit; text-decoration: none;">Changhua, Taiwan</a></div>
            </div>
          </div>
        </section>

        <div class="divider"></div>

        <section class="link-list">
          <a class="link-card" href="https://wa.me/886938608677" target="_blank" rel="noopener noreferrer">
            <div class="platform-icon whatsapp"><i class="fa-brands fa-whatsapp"></i></div>
            <div>
              <div class="platform-title">WhatsApp</div>
              <div class="platform-subtitle">WLK OIL SEALS</div>
            </div>
            <div class="arrow"><i class="fa-solid fa-arrow-right"></i></div>
          </a>

          <a class="link-card" href="https://line.me/ti/p/tCcAVoJMzL" target="_blank" rel="noopener noreferrer">
            <div class="platform-icon line"><i class="fa-brands fa-line"></i></div>
            <div>
              <div class="platform-title">LINE</div>
              <div class="platform-subtitle">Connect with me</div>
            </div>
            <div class="arrow"><i class="fa-solid fa-arrow-right"></i></div>
          </a>
        </section>

      </div>
    </div>
  </div>
</body>
</html>
